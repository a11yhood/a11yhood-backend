name: Export and Release Databases

on:
  push:
    tags:
      - 'db-v*'
  workflow_dispatch:
    inputs:
      export_type:
        description: 'Which exports to create'
        required: true
        default: 'public'
        type: choice
        options:
          - all
          - public
          - test
          - private

permissions:
  contents: write
  packages: read

jobs:
  export:
    runs-on: ubuntu-latest
    environment:
      name: production-db-export
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          # Keep CI Pixi compatible with current pixi.lock format.
          pixi-version: v0.66.0
          post-cleanup: false

      # Export public products (always safe)
      - name: Export public products dataset
        if: github.event.inputs.export_type == 'all' || github.event.inputs.export_type == 'public' || github.event_name == 'push'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL_PROD }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY_PROD }}
        run: |
          pixi run export-public
          ls -lh supabase/public-products.sql

      # Export test database (always safe)
      - name: Export test database
        if: github.event.inputs.export_type == 'all' || github.event.inputs.export_type == 'test' || github.event_name == 'push'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL_TEST }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY_TEST }}
        run: |
          pixi run export-test
          ls -lh supabase/seed-test.sql

      # Export private (only if triggered explicitly or on db tag push)
      - name: Export private full database
        if: github.event.inputs.export_type == 'all' || github.event.inputs.export_type == 'private' || github.event_name == 'push'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL_PROD }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY_PROD }}
        run: |
          pixi run export-private
          ls -lh supabase/full-database.sql

      - name: Validate export schema conformance
        if: always()
        env:
          SUPABASE_URL_PROD: ${{ secrets.SUPABASE_URL_PROD }}
          SUPABASE_KEY_PROD: ${{ secrets.SUPABASE_KEY_PROD }}
          SUPABASE_URL_TEST: ${{ secrets.SUPABASE_URL_TEST }}
          SUPABASE_KEY_TEST: ${{ secrets.SUPABASE_KEY_TEST }}
        run: |
          pixi run validate-exports

      - name: Verify exports restore into local Postgres
        if: always()
        run: |
          pixi run verify-export-restore

      # Create release tag
      - name: Generate version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="db-export-$(date +'%Y%m%d-%H%M%S')"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Releases will be tagged as: $VERSION"

      # Upload public products to public release
      - name: Create public release (products)
        if: always() && (github.event.inputs.export_type == 'all' || github.event.inputs.export_type == 'public' || github.event_name == 'push')
        uses: softprops/action-gh-release@v1
        with:
          files: supabase/public-products.sql
          tag_name: ${{ steps.version.outputs.version }}-public
          name: "Database Export: Public Products [${{ steps.version.outputs.version }}]"
          body: |
            ## Public Products Dataset

            **What's included:**
            - Products (name, description, image, source_rating)
            - Product URLs
            - Tags and categorization
            - Aggregated ratings (avg, count per product - no user IDs)
            - Reference data (sources, categories)

            **What's excluded:** User data, private collections, OAuth configs

            **Use cases:**
            - Share curated dataset with researchers
            - External partner data access
            - Public documentation

            **Size:** $(ls -lh supabase/public-products.sql | awk '{print $5}')
            **Export date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')
            **Source branch:** `${{ github.ref }}`

            ---
            Generated by: Database Export Workflow
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload test database to public release
      - name: Create public release (test)
        if: always() && (github.event.inputs.export_type == 'all' || github.event.inputs.export_type == 'test' || github.event_name == 'push')
        uses: softprops/action-gh-release@v1
        with:
          files: supabase/seed-test.sql
          tag_name: ${{ steps.version.outputs.version }}-test
          name: "Database Export: Test Database [${{ steps.version.outputs.version }}]"
          body: |
            ## Test Database Export

            **What's included:**
            - Complete database schema
            - Test users (fake data: test_user, test_admin)
            - Test products and related data
            - Test collections and ratings
            - OAuth configs with test values
            - Seed script information

            **Safe for:**
            - Developer testing
            - CI/CD pipelines
            - Public sharing
            - Documentation

            **Use cases:**
            1. Local Supabase testing
            2. Docker development
            3. External contributor setup
            4. Reproducible test environments

            **Import instructions:**
            ```bash
            # To local Supabase:
            supabase db push < seed-test.sql

            # To PostgreSQL:
            psql postgresql://user:pass@host/db < seed-test.sql
            ```

            **Size:** $(ls -lh supabase/seed-test.sql | awk '{print $5}')
            **Export date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')
            **Source branch:** `${{ github.ref }}`

            ---
            Generated by: Database Export Workflow
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: always()
        run: |
          echo "## Database Export Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Exports created:**" >> $GITHUB_STEP_SUMMARY
          
          if [ -f supabase/public-products.sql ]; then
            echo "- ✅ Public Products: $(ls -lh supabase/public-products.sql | awk '{print $5}')" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f supabase/seed-test.sql ]; then
            echo "- ✅ Test Database: $(ls -lh supabase/seed-test.sql | awk '{print $5}')" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Releases:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY

  notify:
    runs-on: ubuntu-latest
    needs: export
    if: always()
    
    steps:
      - name: Notify completion
        run: |
          echo "Database export workflow completed"
          echo "Check releases tab for exported data"
