name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.66.0
          post-cleanup: false

      - name: Lint Python
        run: pixi run lint-python

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.66.0
          post-cleanup: false

      - name: Create CI test env file
        env:
          CI_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          CI_SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          CI_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # Always write CI env file to avoid stale or incomplete checked-in values.
          SUPABASE_URL_VALUE="${CI_SUPABASE_URL:-https://example.supabase.co}"
          SUPABASE_KEY_VALUE="${CI_SUPABASE_KEY:-test-service-role-key}"
          SUPABASE_ANON_KEY_VALUE="${CI_SUPABASE_ANON_KEY:-test-anon-key}"

          {
            echo "SECRET_KEY=test-secret-key-for-ci"
            echo "TEST_MODE=true"
            echo "ENVIRONMENT=development"
            echo "SUPABASE_URL=$SUPABASE_URL_VALUE"
            echo "SUPABASE_KEY=$SUPABASE_KEY_VALUE"
            echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY_VALUE"
          } > .env.test

      - name: Run tests
        run: pixi run test