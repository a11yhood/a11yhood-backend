stages:
  - validate
  - build
  - deploy_test
  - deploy_prod

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  IMAGE_NAME: a11yhood-backend
  TEST_DEPLOY_PATH: /opt/a11yhood/backend-test
  PROD_DEPLOY_PATH: /opt/a11yhood/backend-prod

# Validates Docker Compose config early so broken yaml/env refs fail fast.
validate:compose:
  stage: validate
  image: docker:27
  services:
    - docker:27-dind
  script:
    - docker version
    - docker compose version
    - docker compose config >/tmp/compose-rendered.yml
    - test -s /tmp/compose-rendered.yml
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'

build:image:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  script:
    - docker build --pull -t "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA" .
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'

.deploy-template:
  image: alpine:3.20
  before_script:
    - apk add --no-cache openssh-client bash git
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$DEPLOY_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts

# Auto-deploys main to your department test host.
deploy:test:
  extends: .deploy-template
  stage: deploy_test
  variables:
    DEPLOY_HOST: $TEST_DEPLOY_HOST
    DEPLOY_USER: $TEST_DEPLOY_USER
    DEPLOY_PORT: $TEST_DEPLOY_PORT
    DEPLOY_PATH: $TEST_DEPLOY_PATH
    DEPLOY_REF: main
  script:
    - |
      ssh -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST" \
        "DEPLOY_PATH='$DEPLOY_PATH' DEPLOY_REF='$DEPLOY_REF' GITHUB_REPO_URL='$GITHUB_REPO_URL' bash -s" <<'EOF'
      set -euo pipefail
      umask 077

      mkdir -p "$DEPLOY_PATH"
      cd "$DEPLOY_PATH"

      if [ ! -d .git ]; then
        git clone "$GITHUB_REPO_URL" .
      fi

      git fetch origin
      git checkout "$DEPLOY_REF"
      git pull --ff-only origin "$DEPLOY_REF"

      docker compose up -d --build backend
      docker ps --filter name=backend --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
      EOF
  environment:
    name: test
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# Manual gated deployment to production from signed release tags.
deploy:prod:
  extends: .deploy-template
  stage: deploy_prod
  variables:
    DEPLOY_HOST: $PROD_DEPLOY_HOST
    DEPLOY_USER: $PROD_DEPLOY_USER
    DEPLOY_PORT: $PROD_DEPLOY_PORT
    DEPLOY_PATH: $PROD_DEPLOY_PATH
    DEPLOY_REF: $CI_COMMIT_TAG
  script:
    - |
      ssh -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST" \
        "DEPLOY_PATH='$DEPLOY_PATH' DEPLOY_REF='$DEPLOY_REF' GITHUB_REPO_URL='$GITHUB_REPO_URL' bash -s" <<'EOF'
      set -euo pipefail
      umask 077

      mkdir -p "$DEPLOY_PATH"
      cd "$DEPLOY_PATH"

      if [ ! -d .git ]; then
        git clone "$GITHUB_REPO_URL" .
      fi

      git fetch origin --tags
      git checkout "$DEPLOY_REF"

      docker compose --profile production up -d --build backend-prod
      docker ps --filter name=backend-prod --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
      EOF
  environment:
    name: production
  when: manual
  allow_failure: false
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
